<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kursabrechnung</title>
  <style>
    :root{--paper:#EAE8E0;--surface:#FCFBF8;--surface2:#F3F1EA;--ink:#22261F;--muted:#767A6C;--line:#DAD7CC;--pine:#3C5A4E;--pine-d:#2F4840;--ochre:#A9743B;--danger:#A6453B;--serif:Iowan Old Style,Palatino,Georgia,serif;--sans:system-ui,-apple-system,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100%;background:var(--paper);color:var(--ink);font:16px var(--sans);line-height:1.6;}
    #app{min-height:100vh;display:flex;flex-direction:column;}
    .screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:40px;max-width:400px;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .card h1{font:24px var(--serif);margin-bottom:8px;}
    .card p.sub{color:var(--muted);margin-bottom:24px;font-size:14px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px;}
    input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:4px;font:14px var(--sans);background:var(--surface2);color:var(--ink);margin-bottom:16px;}
    textarea{resize:vertical;min-height:60px;}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pine);background:var(--surface);}
    .btn{padding:12px 24px;border:none;border-radius:4px;font:14px var(--sans);font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
    .btn-primary{background:var(--pine);color:var(--surface);width:100%;}
    .btn-primary:active{background:var(--pine-d);}
    .btn-ghost{background:var(--surface2);color:var(--pine);border:1px solid var(--line);}
    .btn-small{padding:6px 12px;font-size:12px;background:rgba(255,255,255,.2);color:var(--surface);border:1px solid rgba(255,255,255,.35);border-radius:3px;cursor:pointer;}
    .btn-mini{padding:6px 10px;font-size:12px;font-weight:600;border-radius:4px;border:1px solid var(--line);background:var(--surface2);color:var(--pine);cursor:pointer;margin:2px;}
    .btn-mini.solid{background:var(--pine);color:var(--surface);border-color:var(--pine);}
    .error{background:#FADBD8;border:1px solid #F5B7B1;color:var(--danger);padding:12px;border-radius:4px;margin-bottom:16px;font-size:13px;}
    .hidden{display:none!important;}
    .ver{position:fixed;top:6px;right:8px;font-size:10px;color:var(--muted);opacity:.7;z-index:50;}
    .header{background:var(--pine);color:var(--surface);padding:16px 20px;font:18px var(--serif);display:flex;justify-content:space-between;align-items:center;}
    .content{flex:1;padding:20px;max-width:820px;margin:0 auto;width:100%;}
    .tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:24px;flex-wrap:wrap;}
    .tab{padding:12px 16px;cursor:pointer;border:none;background:none;font:14px var(--sans);color:var(--muted);border-bottom:3px solid transparent;font-weight:600;}
    .tab.active{color:var(--pine);border-bottom-color:var(--pine);}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .form-section{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:24px;}
    .form-section h2{font:16px var(--serif);margin-bottom:16px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    table{width:100%;border-collapse:collapse;margin-bottom:24px;}
    thead{background:var(--paper);border-bottom:2px solid var(--line);}
    th{padding:10px;text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;}
    td{padding:10px;border-bottom:1px solid var(--line);font-size:14px;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:16px;text-align:center;}
    .stat-value{font:20px var(--serif);font-weight:bold;color:var(--pine);}
    .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;}
    .disclaimer{background:#FFF8E1;border:1px solid #FFE082;border-radius:4px;padding:12px;font-size:12px;color:#666;margin-top:16px;}
    .banner{background:var(--pine-soft,#E4EBE5);border:1px solid var(--pine);border-radius:6px;padding:14px 16px;margin-bottom:20px;font-size:14px;}
    .banner b{color:var(--pine-d);}
    .rrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;background:var(--surface);}
    .rrow .info{font-size:14px;}
    .rrow .info small{color:var(--muted);display:block;}
    .rrow .acts{display:flex;flex-wrap:wrap;justify-content:flex-end;}
    .checkline{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .checkline input{width:auto;margin:0;}
    .checkline label{margin:0;text-transform:none;font-weight:400;color:var(--ink);font-size:14px;}
    /* ===== Rechnung / Invoice ===== */
    .invoice{background:#fff;color:#1a1a1a;max-width:720px;margin:0 auto 24px;padding:40px;border:1px solid var(--line);font:13px var(--sans);line-height:1.5;}
    .inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;gap:20px;}
    .inv-logo{width:230px;max-width:48%;height:auto;}
    .inv-absender{text-align:right;font-size:12px;line-height:1.5;}
    .inv-absender strong{display:block;margin-bottom:2px;}
    .inv-metarow{display:flex;justify-content:space-between;margin-bottom:28px;gap:20px;}
    .inv-lbl{font-weight:700;letter-spacing:1px;font-size:12px;margin-bottom:6px;}
    .inv-an{font-size:12px;}
    .inv-rechnung{text-align:right;font-size:12px;}
    .inv-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
    .inv-table th{text-align:left;border-bottom:1.5px solid #222;padding:8px 6px;font-size:11px;letter-spacing:.5px;color:#222;text-transform:uppercase;}
    .inv-table td{padding:12px 6px;border:none;font-size:12px;vertical-align:top;}
    .inv-table th.r,.inv-table td.r{text-align:right;}
    .inv-total{display:flex;justify-content:space-between;border-top:1.5px solid #222;padding-top:12px;margin-top:8px;font-weight:700;letter-spacing:.5px;font-size:13px;}
    .inv-foot{font-size:11px;color:#444;margin:28px 0 22px;line-height:1.5;}
    .inv-bank{font-size:12px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;}
    .inv-bank .lbl{font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
    .inv-thanks{font-family:'Snell Roundhand','Apple Chancery','Brush Script MT',cursive;font-size:34px;color:#2a2a2a;line-height:1;text-align:right;}
    .inv-steuer{font-size:12px;margin-top:14px;color:#333;}
    .overlay{position:fixed;inset:0;background:rgba(34,38,31,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
    .modal{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:24px;max-width:420px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.2);}
    .modal h2{font:18px var(--serif);margin-bottom:16px;}
    .mailfield{margin-bottom:12px;}
    .mlbl{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
    .mval{background:var(--surface2);border:1px solid var(--line);border-radius:4px;padding:10px;font-size:13px;word-break:break-word;}
    /* Print isolation */
    #printArea{display:none;}
    @media print{
      body{background:#fff;}
      body *{visibility:hidden;}
      #printArea,#printArea *{visibility:visible;}
      #printArea{display:block;position:absolute;left:0;top:0;width:100%;}
      #printArea .invoice{border:none;margin:0;max-width:none;padding:0;}
      @page{margin:1.4cm;}
    }
  </style>
</head>
<body>
  <div class="ver">v14</div>
  <div id="app">
    <div class="screen" id="setupScreen">
      <div class="card">
        <h1>Kursabrechnung</h1>
        <p class="sub">Supabase-Verbindung einrichten</p>
        <div id="setupError" class="error hidden"></div>
        <label>Supabase Project URL</label>
        <input type="text" id="projectUrl" placeholder="https://xyz123.supabase.co">
        <label>Anon Public Key</label>
        <textarea id="anonKey" placeholder="sb_publishable_..." style="font-family:monospace;font-size:12px;"></textarea>
        <button class="btn btn-primary" id="connectBtn">Verbinden</button>
      </div>
    </div>
  </div>
  <div id="printArea"></div>

  <script>
    // ===== Fetch-basierter Supabase-Client (keine externe Bibliothek) =====
    var SB={
      url:null,key:null,token:null,
      init:function(url,key){this.url=(url||'').replace(/\/+$/,'');this.key=(key||'').trim();},
      _headers:function(json){var h={'apikey':this.key,'Authorization':'Bearer '+(this.token||this.key)};if(json)h['Content-Type']='application/json';return h;},
      signIn:function(email,password){
        return fetch(this.url+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':this.key,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})})
          .then(function(r){return r.json();}).then(function(d){if(d&&d.access_token){SB.token=d.access_token;return{ok:true};}var msg=(d&&(d.error_description||d.msg||d.error||d.message))||'Anmeldung fehlgeschlagen';return{ok:false,error:msg};});
      },
      signOut:function(){var u=this.url,h=this._headers(false);this.token=null;return fetch(u+'/auth/v1/logout',{method:'POST',headers:h}).catch(function(){});},
      select:function(table,qs){return fetch(this.url+'/rest/v1/'+table+'?'+(qs||'select=*'),{headers:this._headers(false)}).then(function(r){return r.json();}).then(function(d){return{data:(d&&d.length!==undefined)?d:[],error:(d&&d.message)?d:null};}).catch(function(e){return{data:[],error:e};});},
      insert:function(table,rows){var h=this._headers(true);h['Prefer']='return=representation';return fetch(this.url+'/rest/v1/'+table,{method:'POST',headers:h,body:JSON.stringify(rows)}).then(function(r){return r.json().then(function(d){return{status:r.status,data:d,error:(r.status>=400)?d:null};});}).catch(function(e){return{error:e};});},
      upsert:function(table,rows){var h=this._headers(true);h['Prefer']='resolution=merge-duplicates,return=representation';return fetch(this.url+'/rest/v1/'+table,{method:'POST',headers:h,body:JSON.stringify(rows)}).then(function(r){return r.json().then(function(d){return{status:r.status,data:d,error:(r.status>=400)?d:null};});}).catch(function(e){return{error:e};});},
      update:function(table,id,patch){var h=this._headers(true);h['Prefer']='return=representation';return fetch(this.url+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id),{method:'PATCH',headers:h,body:JSON.stringify(patch)}).then(function(r){return r.json().then(function(d){return{status:r.status,data:d,error:(r.status>=400)?d:null};});}).catch(function(e){return{error:e};});},
      remove:function(table,id){return fetch(this.url+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:this._headers(false)}).catch(function(e){return{error:e};});}
    };

    function saveEintrag(){
      var leistung=document.getElementById('eLeistung').value.trim();

      var datum=document.getElementById('eDatum').value;
      var von=document.getElementById('eVon').value;

        SB.update('eintraege',editingEintrag,row).then(function(r){if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}editingEintrag=null;loadData().then(function(){renderApp();gotoTab('uebersicht');warnIfInvoiced(studioId,datum);});});

    // ---- Excel (.xlsx) Export, komplett ohne externe Bibliothek ----
    var WOCHENTAGE=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    function fmtDateFull(iso){if(!iso)return '';var p=String(iso).split('-');if(p.length!==3)return iso;return p[2].slice(0,2)+'.'+p[1]+'.'+p[0];}
    function weekdayDE(iso){var p=String(iso).split('-');if(p.length!==3)return '';var d=new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10));return WOCHENTAGE[d.getDay()]||'';}
    function monthNameDE(iso){var p=String(iso).split('-');if(p.length!==3)return '';return MONATE[parseInt(p[1],10)-1]||'';}
    function yearOf(iso){var p=String(iso).split('-');return p.length===3?parseInt(p[0],10):'';}
    function rechnungsNrFor(en){var mk=(en.datum||'').slice(0,7);for(var i=0;i<rechnungen.length;i++){if(rechnungen[i].studio_id===en.studio_id&&rechnungen[i].monat===mk)return rechnungen[i].nummer;}return '';}
    function crc32(bytes){var t=crc32._t;if(!t){t=crc32._t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}}var crc=0xFFFFFFFF;for(var i=0;i<bytes.length;i++)crc=(crc>>>8)^t[(crc^bytes[i])&0xFF];return (crc^0xFFFFFFFF)>>>0;}
    function xmlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function colLetter(n){var s='';n++;while(n>0){var m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;}
    function sheetXml(rows){var out='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
      for(var r=0;r<rows.length;r++){out+='<row r="'+(r+1)+'">';for(var c=0;c<rows[r].length;c++){var cell=rows[r][c];var ref=colLetter(c)+(r+1);if(cell===null||cell===undefined||cell==='')continue;if(typeof cell==='number'&&isFinite(cell)){out+='<c r="'+ref+'"><v>'+cell+'</v></c>';}else{out+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(cell)+'</t></is></c>';}}out+='</row>';}
      out+='</sheetData></worksheet>';return out;}
    function buildXlsx(rows,sheetName){
      var enc=new TextEncoder();
      var files=[
        {name:'[Content_Types].xml',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>'},
        {name:'_rels/.rels',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>'},
        {name:'xl/workbook.xml',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="'+xmlEsc(sheetName||'Export')+'" sheetId="1" r:id="rId1"/></sheets></workbook>'},
        {name:'xl/_rels/workbook.xml.rels',data:'<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>'},
        {name:'xl/worksheets/sheet1.xml',data:sheetXml(rows)}
      ];
      function u16(n){return [n&0xFF,(n>>8)&0xFF];}function u32(n){return [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
      var chunks=[],central=[],offset=0;
      for(var i=0;i<files.length;i++){var nameBytes=enc.encode(files[i].name);var data=enc.encode(files[i].data);var crc=crc32(data);
        var lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameBytes.length),u16(0));
        chunks.push(new Uint8Array(lh),nameBytes,data);
        var ch=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameBytes.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
        central.push(new Uint8Array(ch),nameBytes);offset+=lh.length+nameBytes.length+data.length;}
      var centralStart=offset,centralSize=0;for(var j=0;j<central.length;j++){chunks.push(central[j]);centralSize+=central[j].length;}
      var end=[].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(centralSize),u32(centralStart),u16(0));
      chunks.push(new Uint8Array(end));
      var total=0;for(var k=0;k<chunks.length;k++)total+=chunks[k].length;
      var outb=new Uint8Array(total),pos=0;for(var m=0;m<chunks.length;m++){outb.set(chunks[m],pos);pos+=chunks[m].length;}
      return outb;
    }
    function exportExcel(){
      var head=['Jahr','Monat','Tag','Datum','Start','Ende','Ort','Gehalt','Teilnehmer','Betrag','Rechnungsnr.','Leistung','Dauer (min)','Vertretung','km (hin+zur\u00fcck)','Notiz'];
      var arr=eintraege.slice().sort(function(a,b){return (a.datum<b.datum)?-1:1;});
      var rows=[head];
      for(var i=0;i<arr.length;i++){var e=arr[i];var s=studioById(e.studio_id);var mins=minutesBetween(e.zeit_von,e.zeit_bis);var km=(s&&s.entfernung?s.entfernung*2:0);
        rows.push([yearOf(e.datum),monthNameDE(e.datum),weekdayDE(e.datum),fmtDateFull(e.datum),(e.zeit_von||''),(e.zeit_bis||''),(s?s.name:''),'',(e.teilnehmer!=null&&e.teilnehmer!==''?Number(e.teilnehmer):''),Number(betragFor(s,e)),rechnungsNrFor(e),(e.leistung||''),(mins||''),(e.vertretung?'Ja':'Nein'),(km||''),(e.notiz||'')]);}
      var bytes=buildXlsx(rows,'Einnahmen');
      downloadFile(bytes,'Kursabrechnung_'+todayIso()+'.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    }
    function downloadFile(content,filename,mime,shareText,shareTitle){
      try{
        var blob=new Blob([content],{type:mime});
        if(navigator.canShare){var file=new File([blob],filename,{type:mime});
          var data={files:[file],title:shareTitle||filename};if(shareText)data.text=shareText;
          if(navigator.canShare(data)){navigator.share(data).catch(function(){fallbackDownload(blob,filename);});return;}
          if(navigator.canShare({files:[file]})){navigator.share({files:[file],title:shareTitle||filename}).catch(function(){fallbackDownload(blob,filename);});return;}
        }
        fallbackDownload(blob,filename);
      }catch(e){try{fallbackDownload(new Blob([content],{type:mime}),filename);}catch(e2){alert('Export nicht m\u00f6glich auf diesem Ger\u00e4t.');}}
    }
    function fallbackDownload(blob,filename){var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;a.target='_blank';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1500);}

    // ===================== RECHNUNGEN (Monatsabschluss + Archiv) =====================
    function viewRechnungPlaceholder(){return '';}
    function refreshRech(){
      var box=document.getElementById('rechInner');if(!box)return;
      var html='';
      var outdated=outdatedInvoices();
      if(outdated.length){
        html+='<div class="banner" style="background:#FFF3E0;border-color:var(--ochre);">';
        for(var o=0;o<outdated.length;o++){var od=outdated[o];var rr=od.rechnung;
          html+='<div style="'+(o>0?'margin-top:10px;padding-top:10px;border-top:1px solid var(--line);':'')+'"><b>Rechnung '+esc(rr.nummer)+' \u2013 '+esc(od.studio.name)+' ('+monthLabel(rr.monat)+')</b> ist nicht mehr aktuell: '+od.cur+' erfasste Stunde(n), aber '+od.snapCount+' auf der Rechnung. <button class="btn-mini solid regenBtn" data-rid="'+rr.id+'" style="margin-top:6px;">Rechnung neu erstellen</button></div>';
        }
        html+='</div>';
      }
      html+='<div class="form-section"><h2>Monatsabschluss</h2>'
        +'<label>Monat</label><input type="month" id="rMonat" value="'+(analysisMonth||prevMonthKey())+'">'
        +'<button class="btn btn-primary" id="analyzeBtn">Monat analysieren</button></div>';
      if(analysisRows){
        html+='<div class="form-section"><h2>'+monthLabel(analysisMonth)+'</h2>';
        if(!analysisRows.length){html+='<p>Keine Stunden in diesem Monat erfasst.</p>';}
        else{
          var anyOpen=false;
          for(var i=0;i<analysisRows.length;i++){var row=analysisRows[i];if(!row.existing)anyOpen=true;
            html+='<div class="rrow"><div class="info"><strong>'+esc(row.studio.name)+'</strong><small>'+row.positions.length+' Stunde(n) \u00b7 '+fmtEuro(row.total)+(row.existing?' \u00b7 Nr. '+row.existing.nummer:'')+'</small></div><div class="acts">';
            if(row.existing){html+='<button class="btn-mini solid shareBtn" data-rid="'+row.existing.id+'">PDF teilen</button><button class="btn-mini mailBtn" data-rid="'+row.existing.id+'">Mail</button><button class="btn-mini pdfBtn" data-rid="'+row.existing.id+'">PDF</button>';}
            else{html+='<button class="btn-mini solid createBtn" data-idx="'+i+'">Rechnung erstellen</button>';}
            html+='</div></div>';
          }
          if(anyOpen)html+='<button class="btn btn-primary" id="createAllBtn" style="margin-top:8px;">Alle offenen Rechnungen erstellen</button>';
        }
        html+='</div>';
      }
      // Archiv
      html+='<div class="form-section"><h2>Archiv</h2>';
      if(!rechnungen.length){html+='<p style="color:var(--muted);font-size:14px;">Noch keine Rechnungen erstellt.</p>';}
      else{for(var j=0;j<rechnungen.length;j++){var r=rechnungen[j];var st=studioById(r.studio_id);
        html+='<div class="rrow"><div class="info"><strong>Nr. '+esc(r.nummer)+' \u00b7 '+esc(st?st.name:(r.snapshot&&r.snapshot.studio?r.snapshot.studio.name:'?'))+'</strong><small>'+monthLabel(r.monat)+' \u00b7 '+fmtEuro(r.betrag)+' \u00b7 erstellt '+fmtDate(r.datum)+'</small></div><div class="acts"><button class="btn-mini solid shareBtn" data-rid="'+r.id+'">PDF teilen</button><button class="btn-mini mailBtn" data-rid="'+r.id+'">Mail</button><button class="btn-mini pdfBtn" data-rid="'+r.id+'">PDF</button><button class="btn-mini delRechnung" data-rid="'+r.id+'">L\u00f6schen</button></div></div>';
      }}
      html+='</div>';
      box.innerHTML=html;
      var ab=document.getElementById('analyzeBtn');if(ab)ab.addEventListener('click',doAnalyze);
      var ca=document.getElementById('createAllBtn');if(ca)ca.addEventListener('click',function(){createAll();});
      bindList('createBtn','data-idx',function(v){createOne(parseInt(v,10));});
      bindList('pdfBtn','data-rid',function(v){openPdf(v);});
      bindList('shareBtn','data-rid',function(v){sharePdf(v);});
      bindList('mailBtn','data-rid',function(v){openMail(v);});
      bindList('delRechnung','data-rid',function(v){delRechnung(v);});
      bindList('regenBtn','data-rid',function(v){regenerateRechnung(v);});

    function bindList(cls,attr,fn){var els=document.getElementsByClassName(cls);for(var i=0;i<els.length;i++){(function(el){el.addEventListener('click',function(){fn(el.getAttribute(attr));});})(els[i]);}}

    function doAnalyze(){
      var mi=document.getElementById('rMonat');if(!mi||!mi.value){alert('Bitte Monat w\u00e4hlen.');return;}
      analysisMonth=mi.value;
      var map={};
      for(var i=0;i<eintraege.length;i++){var e=eintraege[i];if((e.datum||'').indexOf(analysisMonth)!==0)continue;
        if(!map[e.studio_id])map[e.studio_id]=[];map[e.studio_id].push(e);}
      var rows=[];
      for(var sid in map){if(!map.hasOwnProperty(sid))continue;var s=studioById(sid);if(!s)continue;
        var positions=[],total=0;
        map[sid].sort(function(a,b){return (a.datum<b.datum)?-1:1;});
        for(var k=0;k<map[sid].length;k++){var en=map[sid][k];var betrag=betragFor(s,en);total+=betrag;
          positions.push({leistung:en.leistung||'Unterrichtsstunde',datum:en.datum,von:en.zeit_von,bis:en.zeit_bis,vertretung:!!en.vertretung,betrag:betrag});}
        var existing=null;for(var r=0;r<rechnungen.length;r++){if(rechnungen[r].studio_id===sid&&rechnungen[r].monat===analysisMonth){existing=rechnungen[r];break;}}
        rows.push({studio:s,positions:positions,total:total,existing:existing});
      }
      rows.sort(function(a,b){return a.studio.name<b.studio.name?-1:1;});
      analysisRows=rows;refreshRech();
    }

    function positionsFor(studio,mk){
      var list=[];for(var i=0;i<eintraege.length;i++){var e=eintraege[i];if(e.studio_id===studio.id&&(e.datum||'').indexOf(mk)===0)list.push(e);}
      list.sort(function(a,b){return (a.datum<b.datum)?-1:1;});
      var positions=[],total=0;
      for(var k=0;k<list.length;k++){var en=list[k];var betrag=betragFor(studio,en);total+=betrag;
        positions.push({leistung:en.leistung||'Unterrichtsstunde',datum:en.datum,von:en.zeit_von,bis:en.zeit_bis,vertretung:!!en.vertretung,betrag:betrag});}
      return {positions:positions,total:total,count:list.length};
    }
    function buildSnapshot(studio,positions,total,nummer){return buildSnapshotM(studio,positions,total,nummer,analysisMonth);}
    function buildSnapshotM(studio,positions,total,nummer,mk){
      return {nummer:nummer,datum:todayIso(),monat:mk,monatLabel:monthLabel(mk),
        studio:{name:studio.name,ansprechpartner:studio.ansprechpartner,strasse:studio.strasse,plz:studio.plz,ort:studio.ort,email:studio.email},
        absender:{name:appSettings.name,strasse:appSettings.strasse,plz:appSettings.plz,ort:appSettings.ort,tel:appSettings.tel,email:appSettings.email},
        bank:{inhaber:appSettings.bankInhaber,name:appSettings.bankName,iban:appSettings.iban,bic:appSettings.bic},
        steuernummer:appSettings.steuernummer,positionen:positions,total:total};
    }
    function invoiceForStudioMonth(sid,mk){for(var i=0;i<rechnungen.length;i++){if(rechnungen[i].studio_id===sid&&rechnungen[i].monat===mk)return rechnungen[i];}return null;}
    function outdatedInvoices(){
      var res=[];
      for(var i=0;i<rechnungen.length;i++){var r=rechnungen[i];var s=studioById(r.studio_id);if(!s)continue;
        var cur=positionsFor(s,r.monat).count;var snapCount=(r.snapshot&&r.snapshot.positionen)?r.snapshot.positionen.length:0;
        if(cur!==snapCount)res.push({rechnung:r,studio:s,cur:cur,snapCount:snapCount});}
      return res;
    }
    function regenerateRechnung(oldId){
      var old=getRechnung(oldId);if(!old)return;var s=studioById(old.studio_id);if(!s){alert('Studio nicht gefunden.');return;}
      var pf=positionsFor(s,old.monat);
      if(!pf.count){alert('Keine Stunden mehr f\u00fcr diesen Monat \u2013 bitte Rechnung stattdessen l\u00f6schen.');return;}
      if(!confirm('Rechnung Nr. '+old.nummer+' mit allen aktuellen Stunden ('+pf.count+') neu erstellen? Die alte Fassung wird ersetzt, die Nummer bleibt gleich.'))return;
      var nummer=old.nummer;var snap=buildSnapshotM(s,pf.positions,pf.total,nummer,old.monat);
      SB.remove('rechnungen',oldId).then(function(){
        SB.insert('rechnungen',[{nummer:nummer,studio_id:s.id,monat:old.monat,datum:todayIso(),betrag:pf.total,snapshot:snap}]).then(function(r){
          if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}
          loadData().then(function(){renderApp();gotoTab('rechnungen');if(analysisMonth){var mi=document.getElementById('rMonat');if(mi){mi.value=analysisMonth;doAnalyze();}}});
        });
      });
    }
    function createOne(idx){
      var row=analysisRows[idx];if(!row||row.existing)return;
      var nummer=pad5(appSettings.naechsteNr);
      var snap=buildSnapshot(row.studio,row.positions,row.total,nummer);
      SB.insert('rechnungen',[{nummer:nummer,studio_id:row.studio.id,monat:analysisMonth,datum:snap.datum,betrag:row.total,snapshot:snap}]).then(function(r){
        if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}
        appSettings.naechsteNr=(appSettings.naechsteNr||1)+1;
        saveSettings(true).then(function(){loadData().then(function(){doAnalyze();renderReminder();});});
      });
    }
    function createAll(){
      var open=[];for(var i=0;i<analysisRows.length;i++)if(!analysisRows[i].existing)open.push(analysisRows[i]);
      if(!open.length)return;
      if(!confirm(open.length+' Rechnung(en) erstellen?'))return;
      var payload=[],nr=appSettings.naechsteNr||1;
      for(var j=0;j<open.length;j++){var nummer=pad5(nr);var snap=buildSnapshot(open[j].studio,open[j].positions,open[j].total,nummer);
        payload.push({nummer:nummer,studio_id:open[j].studio.id,monat:analysisMonth,datum:snap.datum,betrag:open[j].total,snapshot:snap});nr++;}
      SB.insert('rechnungen',payload).then(function(r){
        if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}
        appSettings.naechsteNr=nr;saveSettings(true).then(function(){loadData().then(function(){doAnalyze();renderReminder();alert(payload.length+' Rechnung(en) erstellt.');});});
      });
    }
    function getRechnung(id){for(var i=0;i<rechnungen.length;i++)if(rechnungen[i].id===id)return rechnungen[i];return null;}
    function delRechnung(id){
      var rec=getRechnung(id);if(!rec)return;
      if(!confirm('Rechnung Nr. '+rec.nummer+' wirklich l\u00f6schen? Der Eintrag wird aus dem Archiv entfernt.'))return;
      var num=parseInt(rec.nummer,10);
      SB.remove('rechnungen',id).then(function(){
        var releaseNr=(!isNaN(num)&&num===((appSettings.naechsteNr||1)-1));
        function after(){loadData().then(function(){renderApp();gotoTab('rechnungen');if(analysisMonth){var mi=document.getElementById('rMonat');if(mi){mi.value=analysisMonth;doAnalyze();}}});}
        if(releaseNr){appSettings.naechsteNr=num;saveSettings(true).then(after);}else{after();}
      });
    }

    function openPdf(id){
      var rec=getRechnung(id);if(!rec||!rec.snapshot){alert('Rechnung nicht gefunden.');return;}
      document.getElementById('printArea').innerHTML=invoiceHTML(rec.snapshot);
      setTimeout(function(){window.print();},60);
    }
    function openMail(id){
      var rec=getRechnung(id);if(!rec){alert('Rechnung nicht gefunden.');return;}
      var snap=rec.snapshot||{};var to=(snap.studio&&snap.studio.email)?snap.studio.email:'';
      var su=(appSettings.mailBetreff||'').replace('{nr}',rec.nummer).replace('{zeitraum}',monthLabel(rec.monat));
      var body=appSettings.mailText||'';
      showMailDialog(to,su,body);
    }
    function showMailDialog(to,su,body){
      var webUrl='https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(to)+'&su='+encodeURIComponent(su)+'&body='+encodeURIComponent(body);
      var appUrl='googlegmail:///co?to='+encodeURIComponent(to)+'&subject='+encodeURIComponent(su)+'&body='+encodeURIComponent(body);
      var mailtoUrl='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(su)+'&body='+encodeURIComponent(body);
      var ov=document.getElementById('mailOverlay');if(ov)ov.parentNode.removeChild(ov);
      ov=document.createElement('div');ov.id='mailOverlay';ov.className='overlay';
      ov.innerHTML='<div class="modal"><h2>Mail-Entwurf</h2>'
        +'<div class="mailfield"><span class="mlbl">An</span><div class="mval" id="mfTo">'+esc(to||'(keine E-Mail beim Studio hinterlegt)')+'</div></div>'
        +'<div class="mailfield"><span class="mlbl">Betreff</span><div class="mval" id="mfSu">'+esc(su)+'</div></div>'
        +'<div class="mailfield"><span class="mlbl">Text</span><div class="mval" id="mfBody" style="white-space:pre-wrap;">'+esc(body)+'</div></div>'
        +(to?'<button class="btn btn-ghost" id="mAddrBtn" style="width:100%;margin-bottom:8px;">E-Mail-Adresse kopieren</button>':'')
        +'<button class="btn btn-primary" id="mCopyBtn">Betreff + Text kopieren</button>'
        +'<button class="btn btn-ghost" id="mAppBtn" style="width:100%;margin-top:8px;">Gmail-App \u00f6ffnen</button>'
        +'<button class="btn btn-ghost" id="mWebBtn" style="width:100%;margin-top:8px;">Gmail (Web) \u00f6ffnen</button>'
        +'<button class="btn btn-ghost" id="mMailtoBtn" style="width:100%;margin-top:8px;">Standard-Mail-App \u00f6ffnen</button>'
        +'<button class="btn-mini" id="mCloseBtn" style="margin-top:14px;">Schlie\u00dfen</button>'
        +'<p style="font-size:12px;color:var(--muted);margin-top:12px;">Empfohlen: erst <b>\u201ePDF teilen\u201c</b> \u2192 Gmail (PDF h\u00e4ngt an), dann hier <b>Adresse</b> und <b>Text</b> kopieren und in die Mail einf\u00fcgen.</p>'
        +'</div>';
      document.body.appendChild(ov);
      var addrBtn=document.getElementById('mAddrBtn');if(addrBtn)addrBtn.addEventListener('click',function(){copyText(to,this);});
      document.getElementById('mAppBtn').addEventListener('click',function(){window.location.href=appUrl;});
      document.getElementById('mWebBtn').addEventListener('click',function(){window.open(webUrl,'_blank');});
      document.getElementById('mMailtoBtn').addEventListener('click',function(){window.location.href=mailtoUrl;});
      document.getElementById('mCopyBtn').addEventListener('click',function(){copyText('Betreff: '+su+'\n\n'+body,this);});
      document.getElementById('mCloseBtn').addEventListener('click',function(){ov.parentNode.removeChild(ov);});
      ov.addEventListener('click',function(e){if(e.target===ov)ov.parentNode.removeChild(ov);});
    }
    function copyText(text,btn){
      function ok(){if(btn){var t=btn.textContent;btn.textContent='Kopiert \u2713';setTimeout(function(){btn.textContent=t;},1500);}}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(ok).catch(function(){fallbackCopy(text,ok);});}
      else{fallbackCopy(text,ok);}
    }
    function fallbackCopy(text,ok){try{var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();}catch(e){alert('Kopieren nicht m\u00f6glich \u2013 bitte Text manuell markieren.');}}

    // ===================== PDF-GENERATOR (ohne externe Bibliothek) =====================
    var LOGO_W=520,LOGO_H=355;
    function logoBytes(){var b64=LOGO.split(',')[1];var bin=atob(b64);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
    var HW={' ':278,'!':278,'"':355,'#':556,'$':556,'%':889,'&':667,"'":191,'(':333,')':333,'*':389,'+':584,',':278,'-':333,'.':278,'/':278,'0':556,'1':556,'2':556,'3':556,'4':556,'5':556,'6':556,'7':556,'8':556,'9':556,':':278,';':278,'<':584,'=':584,'>':584,'?':556,'@':1015,'A':667,'B':667,'C':722,'D':722,'E':667,'F':611,'G':778,'H':722,'I':278,'J':500,'K':667,'L':556,'M':833,'N':722,'O':778,'P':667,'Q':778,'R':722,'S':667,'T':611,'U':722,'V':667,'W':944,'X':667,'Y':667,'Z':611,'[':278,'\\':278,']':278,'^':469,'_':556,'`':333,'a':556,'b':556,'c':500,'d':556,'e':556,'f':278,'g':556,'h':556,'i':222,'j':222,'k':500,'l':222,'m':833,'n':556,'o':556,'p':556,'q':556,'r':333,'s':500,'t':278,'u':556,'v':500,'w':722,'x':500,'y':500,'z':500,'{':334,'|':260,'}':334,'~':584,'\u00e4':556,'\u00f6':556,'\u00fc':556,'\u00c4':667,'\u00d6':778,'\u00dc':722,'\u00df':611,'\u20ac':556,'\u2013':556,'\u2014':1000,'\u00b7':278,'\u00a7':556,'\u00e9':556,'\u2019':191};
    var WINMAP={'\u20ac':0x80,'\u2013':0x96,'\u2014':0x97,'\u2019':0x92,'\u00b7':0xb7,'\u00a7':0xa7};
    function pdfCharW(ch){return (HW[ch]!=null?HW[ch]:556);}
    function pdfTextW(s,size){s=String(s);var w=0;for(var i=0;i<s.length;i++)w+=pdfCharW(s[i]);return w/1000*size;}
    function pdfEscape(s){s=String(s);var out='';for(var i=0;i<s.length;i++){var ch=s[i];var code=s.charCodeAt(i);if(ch==='('){out+='\\(';}else if(ch===')'){out+='\\)';}else if(ch==='\\'){out+='\\\\';}else if(code<128){out+=ch;}else{var b=(WINMAP[ch]!=null?WINMAP[ch]:(code<256?code:63));out+='\\'+('000'+b.toString(8)).slice(-3);}}return out;}
    function pdfWrap(text,maxWidth,size){var words=String(text).split(' ');var lines=[];var cur='';for(var i=0;i<words.length;i++){var test=cur?cur+' '+words[i]:words[i];if(pdfTextW(test,size)>maxWidth&&cur){lines.push(cur);cur=words[i];}else{cur=test;}}if(cur)lines.push(cur);return lines;}
    function buildInvoicePdf(snap,logoB,logoW,logoH){
      var PW=595,PH=842,M=42,RIGHT=PW-M;var c=[];
      function Y(top){return PH-top;}
      function gray(g){c.push(g.toFixed(3)+' g');}
      function line(x1,top1,x2,top2,w,g){c.push('q '+(g==null?0.15:g).toFixed(3)+' G '+(w||1)+' w '+x1+' '+Y(top1)+' m '+x2+' '+Y(top2)+' l S Q');}
      function text(x,top,str,size,font,g){gray(g==null?0:g);c.push('BT /'+(font||'F1')+' '+size+' Tf 1 0 0 1 '+x+' '+(Y(top)-size)+' Tm ('+pdfEscape(str)+') Tj ET');}
      function textR(xr,top,str,size,font,g){text(xr-pdfTextW(str,size),top,str,size,font,g);}
      var logoDispW=150,logoDispH=logoDispW*logoH/logoW;
      c.push('q '+logoDispW+' 0 0 '+logoDispH+' '+M+' '+(Y(M)-logoDispH)+' cm /Im0 Do Q');
      var ay=M+6,alh=13,abs=snap.absender||{};
      textR(RIGHT,ay,abs.name||'',10.5,'F2');ay+=alh;
      if(abs.strasse){textR(RIGHT,ay,abs.strasse,9.5,'F1',0.25);ay+=alh;}
      var plzort=((abs.plz||'')+' '+(abs.ort||'')).trim();if(plzort){textR(RIGHT,ay,plzort,9.5,'F1',0.25);ay+=alh;}
      if(abs.tel){textR(RIGHT,ay,'Tel.: '+abs.tel,9.5,'F1',0.25);ay+=alh;}
      if(abs.email){textR(RIGHT,ay,'E: '+abs.email,9.5,'F1',0.25);ay+=alh;}
      var blockTop=175;text(M,blockTop,'AN',10,'F2',0.15);
      var sy=blockTop+16,slh=13,st=snap.studio||{};var anLines=[];
      if(st.name)anLines.push(st.name);if(st.ansprechpartner)anLines.push(st.ansprechpartner);if(st.strasse)anLines.push(st.strasse);
      var sp=((st.plz||'')+' '+(st.ort||'')).trim();if(sp)anLines.push(sp);if(st.email)anLines.push(st.email);
      for(var i=0;i<anLines.length;i++){text(M,sy,anLines[i],10,'F1',0.1);sy+=slh;}
      textR(RIGHT,blockTop,'RECHNUNG',10,'F2',0.15);var ry=blockTop+16;
      textR(RIGHT,ry,'Datum: '+snap.datumFmt,9.5,'F1',0.1);ry+=slh;
      textR(RIGHT,ry,'Rechnungsdatum: '+snap.datumFmt,9.5,'F1',0.1);ry+=slh;
      textR(RIGHT,ry,'Rechnungs-Nr.: '+snap.nummer,9.5,'F1',0.1);ry+=slh;
      var ty=Math.max(sy,ry)+22;var colL=M,colDat=300,colUhr=372,colLen=452,colBet=RIGHT;
      text(colL,ty,'LEISTUNG',8.5,'F2',0.1);text(colDat,ty,'DATUM',8.5,'F2',0.1);text(colUhr,ty,'UHRZEIT',8.5,'F2',0.1);text(colLen,ty,'L\u00c4NGE',8.5,'F2',0.1);textR(colBet,ty,'BETRAG',8.5,'F2',0.1);
      ty+=12;line(M,ty,RIGHT,ty,1.2,0.13);ty+=15;
      var pos=snap.positionen||[];
      for(var p=0;p<pos.length;p++){var it=pos[p];
        text(colL,ty,it.leistung||'',10,'F1',0.05);text(colDat,ty,it.datumFmt||'',10,'F1',0.05);text(colUhr,ty,it.uhr||'',10,'F1',0.05);text(colLen,ty,it.laenge||'',10,'F1',0.05);textR(colBet,ty,it.betragFmt||'',10,'F1',0.05);
        var extra=0;if(it.vertretung){text(colL,ty+13,'(Vertretungsstunde)',9,'F1',0.45);extra=15;}ty+=22+extra;}
      ty+=2;line(M,ty,RIGHT,ty,1.2,0.13);ty+=16;
      text(M,ty,'GESAMTBETRAG',10.5,'F2',0);textR(RIGHT,ty,snap.totalFmt,10.5,'F2',0);ty+=30;
      var footLines=pdfWrap(snap.foot,RIGHT-M,8.5);for(var f=0;f<footLines.length;f++){text(M,ty,footLines[f],8.5,'F1',0.3);ty+=12;}ty+=16;
      text(M,ty,'BANKVERBINDUNG',9,'F2',0.1);var by=ty+15,bk=snap.bank||{};
      text(M,by,bk.inhaber||'',9.5,'F1',0.1);by+=13;text(M,by,bk.name||'',9.5,'F1',0.1);by+=13;text(M,by,'IBAN: '+(bk.iban||''),9.5,'F1',0.1);by+=13;text(M,by,'BIC: '+(bk.bic||''),9.5,'F1',0.1);by+=18;
      text(M,by,'Steuernummer: '+(snap.steuernummer||''),9.5,'F1',0.15);
      textR(RIGHT,ty+16,'thank you',22,'F3',0.2);
      var content=c.join('\n');
      var objs=[];objs[1]='<< /Type /Catalog /Pages 2 0 R >>';objs[2]='<< /Type /Pages /Kids [3 0 R] /Count 1 >>';
      objs[3]='<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+PW+' '+PH+'] /Resources << /Font << /F1 5 0 R /F2 6 0 R /F3 7 0 R >> /XObject << /Im0 8 0 R >> >> /Contents 4 0 R >>';
      objs[5]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';
      objs[6]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';
      objs[7]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique /Encoding /WinAnsiEncoding >>';
      var segs=[],total=0,offsets=[];
      function pushStr(s){var arr=[];for(var i=0;i<s.length;i++)arr.push(s.charCodeAt(i)&0xFF);var u=new Uint8Array(arr);segs.push(u);total+=u.length;}
      function pushBytes(u){segs.push(u);total+=u.length;}
      pushStr('%PDF-1.4\n%\u00e2\u00e3\u00cf\u00d3\n');
      function writeObj(n,body){offsets[n]=total;pushStr(n+' 0 obj\n'+body+'\nendobj\n');}
      writeObj(1,objs[1]);writeObj(2,objs[2]);writeObj(3,objs[3]);
      offsets[4]=total;pushStr('4 0 obj\n<< /Length '+content.length+' >>\nstream\n'+content+'\nendstream\nendobj\n');
      writeObj(5,objs[5]);writeObj(6,objs[6]);writeObj(7,objs[7]);
      offsets[8]=total;pushStr('8 0 obj\n<< /Type /XObject /Subtype /Image /Width '+logoW+' /Height '+logoH+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+logoB.length+' >>\nstream\n');
      pushBytes(logoB);pushStr('\nendstream\nendobj\n');
      var xrefStart=total;var xref='xref\n0 9\n0000000000 65535 f \n';for(var o=1;o<=8;o++){xref+=('0000000000'+offsets[o]).slice(-10)+' 00000 n \n';}
      pushStr(xref);pushStr('trailer\n<< /Size 9 /Root 1 0 R /Info << /Title ('+pdfEscape(snap.title||'Rechnung')+') /Producer (Kursabrechnung) >> >>\nstartxref\n'+xrefStart+'\n%%EOF');
      var out=new Uint8Array(total),pos2=0;for(var s=0;s<segs.length;s++){out.set(segs[s],pos2);pos2+=segs[s].length;}
      return out;
    }
    function pdfSnapFromRechnung(rec){
      var s=rec.snapshot||{};var positionen=[];var src=s.positionen||[];
      for(var i=0;i<src.length;i++){var p=src[i];positionen.push({leistung:p.leistung||'',datumFmt:fmtDate(p.datum),uhr:(p.von&&p.bis)?(p.von+'\u2013'+p.bis):'',laenge:laenge(p.von,p.bis),betragFmt:fmtEuro(p.betrag),vertretung:!!p.vertretung});}
      var studioName=(s.studio&&s.studio.name)||'';
      return {title:'Rechnung '+rec.nummer+' - '+studioName+' - '+monthLabel(rec.monat),nummer:rec.nummer,datumFmt:fmtDate(rec.datum||s.datum),
        absender:s.absender||{},studio:s.studio||{},bank:s.bank||{},steuernummer:s.steuernummer||'',foot:FOOT,positionen:positionen,totalFmt:fmtEuro(s.total!=null?s.total:rec.betrag)};
    }
    function sharePdf(id){
      var rec=getRechnung(id);if(!rec||!rec.snapshot){alert('Rechnung nicht gefunden.');return;}
      try{
        var snap=pdfSnapFromRechnung(rec);
        var bytes=buildInvoicePdf(snap,logoBytes(),LOGO_W,LOGO_H);
        var studioName=(rec.snapshot.studio&&rec.snapshot.studio.name)||'';
        var name=('Rechnung '+rec.nummer+' \u2013 '+studioName+' \u2013 '+monthLabel(rec.monat)+'.pdf').replace(/[\/\\:*?"<>|]/g,'-');
        var su=(appSettings.mailBetreff||'').replace('{nr}',rec.nummer).replace('{zeitraum}',monthLabel(rec.monat));
        var body=appSettings.mailText||'';
        downloadFile(bytes,name,'application/pdf',body,su);
      }catch(e){alert('PDF konnte nicht erstellt werden: '+e.message);}
    }

    // ===================== BINDINGS =====================
    function bindAppButtons(){
      var ex=document.getElementById('exportBtn');if(ex)ex.addEventListener('click',exportExcel);
      var se=document.getElementById('saveEintrag');if(se)se.addEventListener('click',saveEintrag);
      var ss=document.getElementById('saveStudio');if(ss)ss.addEventListener('click',saveStudio);
      var st=document.getElementById('saveSettings');if(st)st.addEventListener('click',doSaveSettings);
      var de=document.getElementsByClassName('delEintrag');for(var i=0;i<de.length;i++){(function(el){el.addEventListener('click',function(){delEintrag(el.getAttribute('data-id'));});})(de[i]);}
      var ee=document.getElementsByClassName('editEintrag');for(var n=0;n<ee.length;n++){(function(el){el.addEventListener('click',function(){editEintrag(el.getAttribute('data-id'));});})(ee[n]);}
      var ce=document.getElementById('cancelEintrag');if(ce)ce.addEventListener('click',cancelEditEintrag);
      var ds=document.getElementsByClassName('delStudio');for(var j=0;j<ds.length;j++){(function(el){el.addEventListener('click',function(){delStudio(el.getAttribute('data-id'));});})(ds[j]);}
      var es=document.getElementsByClassName('editStudio');for(var k=0;k<es.length;k++){(function(el){el.addEventListener('click',function(){editStudio(el.getAttribute('data-id'));});})(es[k]);}
      var cs=document.getElementById('cancelStudio');if(cs)cs.addEventListener('click',cancelEditStudio);
      var estudio=document.getElementById('eStudio');if(estudio)estudio.addEventListener('change',computeBetrag);
      var evon=document.getElementById('eVon');if(evon)evon.addEventListener('change',computeBetrag);
      var ebis=document.getElementById('eBis');if(ebis)ebis.addEventListener('change',computeBetrag);
      var ebetrag=document.getElementById('eBetrag');if(ebetrag)ebetrag.addEventListener('input',function(){betragManual=true;});
    }

    // ===================== BOOT =====================
    function boot(){
      try{
        var btn=document.getElementById('connectBtn');if(btn)btn.addEventListener('click',doConnect);
        var url=localStorage.getItem('supabaseUrl');var key=localStorage.getItem('supabaseKey');
        if(url&&key){SB.init(url,key);renderAuth();}
      }catch(err){console.error('Boot error:',err);}
    }
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{boot();}
