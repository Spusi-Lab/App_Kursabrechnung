<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kursabrechnung</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui; background: #EAE8E0; margin: 0; padding: 20px; }
    .card { background: white; padding: 40px; border-radius: 8px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 16px; font-family: system-ui; }
    button { width: 100%; padding: 12px; background: #3C5A4E; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2F4840; }
    .error { background: #FADBD8; color: #A6453B; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kursabrechnung</h1>
    <p>Supabase-Verbindung einrichten</p>
    <div id="error" class="error" style="display:none;"></div>
    <div>
      <label>Supabase Project URL</label>
      <input type="text" id="url" placeholder="https://xyz.supabase.co">
      <label>Anon Public Key</label>
      <textarea id="key" placeholder="sb_publishable_..."></textarea>
      <button onclick="connect()">Verbinden</button>
    </div>
  </div>

  <script>
    function connect() {
      const url = document.getElementById('url').value.trim();
      const key = document.getElementById('key').value.trim();
      const errorDiv = document.getElementById('error');

      if (!url || !key) {
        errorDiv.textContent = 'Bitte beide Felder ausfüllen.';
        errorDiv.style.display = 'block';
        return;
      }

      if (typeof window.supabase === 'undefined') {
        errorDiv.textContent = 'Supabase wird geladen. Bitte warte einen Moment.';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        window.supabase.createClient(url, key);
        alert('Verbindung erfolgreich! Laden Sie die vollständige App neu.');
      } catch (err) {
        errorDiv.textContent = 'Fehler: ' + err.message;
        errorDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
