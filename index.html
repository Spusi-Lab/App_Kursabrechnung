<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kursabrechnung</title>
  <style>
    :root{--paper:#EAE8E0;--surface:#FCFBF8;--surface2:#F3F1EA;--ink:#22261F;--muted:#767A6C;--line:#DAD7CC;--pine:#3C5A4E;--pine-d:#2F4840;--danger:#A6453B;--serif:Iowan Old Style,Palatino,Georgia,serif;--sans:system-ui,-apple-system,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100%;background:var(--paper);color:var(--ink);font:16px var(--sans);line-height:1.6;}
    #app{min-height:100vh;display:flex;flex-direction:column;}
    .screen{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:40px;max-width:400px;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.05);}
    .card h1{font:24px var(--serif);margin-bottom:8px;}
    .card p.sub{color:var(--muted);margin-bottom:24px;font-size:14px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px;}
    input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:4px;font:14px var(--sans);background:var(--surface2);color:var(--ink);margin-bottom:16px;}
    textarea{resize:vertical;min-height:60px;font-family:monospace;font-size:12px;}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pine);background:var(--surface);}
    .btn{padding:12px 24px;border:none;border-radius:4px;font:14px var(--sans);font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
    .btn-primary{background:var(--pine);color:var(--surface);width:100%;}
    .btn-primary:active{background:var(--pine-d);}
    .btn-small{padding:6px 12px;font-size:12px;background:rgba(255,255,255,.2);color:var(--surface);border:1px solid rgba(255,255,255,.35);border-radius:3px;cursor:pointer;}
    .error{background:#FADBD8;border:1px solid #F5B7B1;color:var(--danger);padding:12px;border-radius:4px;margin-bottom:16px;font-size:13px;}
    .hidden{display:none!important;}
    .ver{position:fixed;top:6px;right:8px;font-size:10px;color:var(--muted);opacity:.7;}
    .header{background:var(--pine);color:var(--surface);padding:16px 20px;font:18px var(--serif);display:flex;justify-content:space-between;align-items:center;}
    .content{flex:1;padding:20px;}
    .tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:24px;flex-wrap:wrap;}
    .tab{padding:12px 16px;cursor:pointer;border:none;background:none;font:14px var(--sans);color:var(--muted);border-bottom:3px solid transparent;font-weight:600;}
    .tab.active{color:var(--pine);border-bottom-color:var(--pine);}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
    .form-section{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:24px;}
    .form-section h2{font:16px var(--serif);margin-bottom:16px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    table{width:100%;border-collapse:collapse;margin-bottom:24px;}
    thead{background:var(--paper);border-bottom:2px solid var(--line);}
    th{padding:12px;text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;}
    td{padding:12px;border-bottom:1px solid var(--line);}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:16px;text-align:center;}
    .stat-value{font:20px var(--serif);font-weight:bold;color:var(--pine);}
    .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;}
    .disclaimer{background:#FFF8E1;border:1px solid #FFE082;border-radius:4px;padding:12px;font-size:12px;color:#666;margin-top:16px;}
    @media print{.header,.tabs,.btn,input,textarea,.tab-content:not(.active){display:none!important;}.tab-content.active{display:block!important;}}
  </style>
</head>
<body>
  <div class="ver">v4</div>
  <div id="app">
    <!-- Setup-Screen steht FEST im HTML, damit immer etwas sichtbar ist -->
    <div class="screen" id="setupScreen">
      <div class="card">
        <h1>Kursabrechnung</h1>
        <p class="sub">Supabase-Verbindung einrichten</p>
        <div id="setupError" class="error hidden"></div>
        <label>Supabase Project URL</label>
        <input type="text" id="projectUrl" placeholder="https://xyz123.supabase.co">
        <label>Anon Public Key</label>
        <textarea id="anonKey" placeholder="sb_publishable_..."></textarea>
        <button class="btn btn-primary" id="connectBtn">Verbinden</button>
      </div>
    </div>
  </div>

  <script>
    // Eigener Supabase-Client auf fetch-Basis – keine externe Bibliothek nötig.
    var SB={
      url:null,key:null,token:null,
      init:function(url,key){this.url=(url||'').replace(/\/+$/,'');this.key=(key||'').trim();},
      _headers:function(json){
        var h={'apikey':this.key,'Authorization':'Bearer '+(this.token||this.key)};
        if(json)h['Content-Type']='application/json';
        return h;
      },
      signIn:function(email,password){
        return fetch(this.url+'/auth/v1/token?grant_type=password',{
          method:'POST',
          headers:{'apikey':this.key,'Content-Type':'application/json'},
          body:JSON.stringify({email:email,password:password})
        }).then(function(r){return r.json();}).then(function(d){
          if(d&&d.access_token){SB.token=d.access_token;return{ok:true};}
          var msg=(d&&(d.error_description||d.msg||d.error||d.message))||'Anmeldung fehlgeschlagen';
          return{ok:false,error:msg};
        });
      },
      signOut:function(){
        var u=this.url,h=this._headers(false);this.token=null;
        return fetch(u+'/auth/v1/logout',{method:'POST',headers:h}).catch(function(){});
      },
      select:function(table,qs){
        return fetch(this.url+'/rest/v1/'+table+'?'+(qs||'select=*'),{headers:this._headers(false)})
          .then(function(r){return r.json();})
          .then(function(d){return{data:(d&&d.length!==undefined)?d:[],error:(d&&d.message)?d:null};})
          .catch(function(e){return{data:[],error:e};});
      },
      insert:function(table,rows){
        var h=this._headers(true);h['Prefer']='return=representation';
        return fetch(this.url+'/rest/v1/'+table,{method:'POST',headers:h,body:JSON.stringify(rows)})
          .then(function(r){return r.json().then(function(d){return{status:r.status,data:d,error:(r.status>=400)?d:null};});})
          .catch(function(e){return{error:e};});
      },
      upsert:function(table,rows){
        var h=this._headers(true);h['Prefer']='resolution=merge-duplicates,return=representation';
        return fetch(this.url+'/rest/v1/'+table,{method:'POST',headers:h,body:JSON.stringify(rows)})
          .then(function(r){return r.json().then(function(d){return{status:r.status,data:d,error:(r.status>=400)?d:null};});})
          .catch(function(e){return{error:e};});
      },
      remove:function(table,id){
        return fetch(this.url+'/rest/v1/'+table+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:this._headers(false)})
          .catch(function(e){return{error:e};});
      }
    };
    var studios=[],eintraege=[];
    var appSettings={name:'Katharina',strasse:'',plz:'',ort:'',kmSatz:0.30,rechnungPrefix:'2026-',naechsteNr:1,einheit:'Kurs'};
    var app=document.getElementById('app');

    function showError(id,msg){var e=document.getElementById(id);if(e){e.textContent=msg;e.classList.remove('hidden');}}

    function renderAuth(){
      app.innerHTML='<div class="screen"><div class="card"><h1>Anmelden</h1>'
        +'<div id="authError" class="error hidden"></div>'
        +'<label>E-Mail</label><input type="email" id="email" placeholder="deine@email.com">'
        +'<label>Passwort</label><input type="password" id="password" placeholder="Passwort">'
        +'<button class="btn btn-primary" id="loginBtn">Anmelden</button>'
        +'<div style="margin-top:16px;text-align:center;"><button class="btn-small" id="resetBtn">Verbindung ändern</button></div>'
        +'</div></div>';
      document.getElementById('loginBtn').addEventListener('click',doLogin);
      document.getElementById('resetBtn').addEventListener('click',function(){
        localStorage.removeItem('supabaseUrl');localStorage.removeItem('supabaseKey');location.reload();
      });
    }

    function doConnect(){
      var url=document.getElementById('projectUrl').value.trim();
      var key=document.getElementById('anonKey').value.trim();
      if(!url||!key){showError('setupError','Bitte beide Felder ausfüllen.');return;}
      SB.init(url,key);
      localStorage.setItem('supabaseUrl',url);
      localStorage.setItem('supabaseKey',key);
      renderAuth();
    }

    function doLogin(){
      var email=document.getElementById('email').value.trim();
      var password=document.getElementById('password').value;
      if(!email||!password){showError('authError','Bitte E-Mail und Passwort eingeben.');return;}
      var btn=document.getElementById('loginBtn');if(btn){btn.textContent='Anmelden…';btn.disabled=true;}
      SB.signIn(email,password).then(function(res){
        if(!res.ok){if(btn){btn.textContent='Anmelden';btn.disabled=false;}showError('authError','Anmeldung fehlgeschlagen: '+res.error);return;}
        loadData().then(renderApp);
      }).catch(function(err){if(btn){btn.textContent='Anmelden';btn.disabled=false;}showError('authError','Fehler: '+err.message);});
    }

    function loadData(){
      return Promise.all([
        SB.select('studios','select=*').then(function(r){if(r.data)studios=r.data;}),
        SB.select('eintraege','select=*').then(function(r){if(r.data)eintraege=r.data;}),
        SB.select('app_settings','id=eq.main&select=data').then(function(r){if(r.data&&r.data[0]&&r.data[0].data)appSettings=Object.assign(appSettings,r.data[0].data);}).catch(function(){})
      ]);
    }

    function renderApp(){
      app.innerHTML='<div class="header"><div>Kursabrechnung</div><button class="btn-small" id="logoutBtn">Abmelden</button></div>'
        +'<div class="content"><div class="tabs">'
        +'<button class="tab active" data-tab="erfassen">Erfassen</button>'
        +'<button class="tab" data-tab="uebersicht">Übersicht</button>'
        +'<button class="tab" data-tab="rechnung">Rechnung</button>'
        +'<button class="tab" data-tab="fahrtkosten">Fahrtkosten</button>'
        +'<button class="tab" data-tab="studios">Studios</button>'
        +'<button class="tab" data-tab="einstellungen">Einstellungen</button></div>'
        +'<div id="erfassen" class="tab-content active">'+viewErfassen()+'</div>'
        +'<div id="uebersicht" class="tab-content">'+viewUebersicht()+'</div>'
        +'<div id="rechnung" class="tab-content">'+viewRechnung()+'</div>'
        +'<div id="fahrtkosten" class="tab-content">'+viewFahrtkosten()+'</div>'
        +'<div id="studios" class="tab-content">'+viewStudios()+'</div>'
        +'<div id="einstellungen" class="tab-content">'+viewEinstellungen()+'</div>'
        +'</div>';
      document.getElementById('logoutBtn').addEventListener('click',function(){SB.signOut().then(renderAuth);});
      var tabs=document.querySelectorAll('.tab');
      for(var i=0;i<tabs.length;i++){tabs[i].addEventListener('click',function(e){
        var t=e.target.getAttribute('data-tab');
        var all=document.querySelectorAll('.tab');for(var j=0;j<all.length;j++)all[j].classList.remove('active');
        var cs=document.querySelectorAll('.tab-content');for(var k=0;k<cs.length;k++)cs[k].classList.remove('active');
        e.target.classList.add('active');document.getElementById(t).classList.add('active');
      });}
      bindAppButtons();
    }

    function studioOptions(){var o='<option value="">-- Wählen --</option>';for(var i=0;i<studios.length;i++)o+='<option value="'+studios[i].id+'">'+studios[i].name+'</option>';return o;}

    function viewErfassen(){return '<div class="form-section"><h2>Neuer Eintrag</h2>'
      +'<label>Datum</label><input type="date" id="eDatum">'
      +'<label>Studio</label><select id="eStudio">'+studioOptions()+'</select>'
      +'<label>Anzahl</label><input type="number" id="eAnzahl" value="1" min="1">'
      +'<label>Notiz</label><input type="text" id="eNotiz" placeholder="z.B. Ersatz">'
      +'<button class="btn btn-primary" id="saveEintrag">Speichern</button></div>';}

    function viewUebersicht(){
      if(!eintraege.length)return '<p>Noch keine Einträge.</p>';
      var rows='';for(var i=0;i<eintraege.length;i++){var e=eintraege[i];var s=null;for(var j=0;j<studios.length;j++)if(studios[j].id===e.studio_id)s=studios[j];
        rows+='<tr><td>'+e.datum+'</td><td>'+(s?s.name:'?')+'</td><td>'+e.anzahl+'</td><td>'+(e.notiz||'–')+'</td><td><button class="btn-small delEintrag" data-id="'+e.id+'">Löschen</button></td></tr>';}
      return '<table><thead><tr><th>Datum</th><th>Studio</th><th>Anzahl</th><th>Notiz</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    }

    function viewRechnung(){return '<div class="form-section"><h2>Rechnung generieren</h2>'
      +'<label>Monat</label><input type="month" id="rMonat">'
      +'<label>Studio</label><select id="rStudio"><option value="">-- Alle --</option>'+studioOptions().replace('<option value="">-- Wählen --</option>','')+'</select>'
      +'<button class="btn btn-primary" id="genRechnung">Vorschau</button></div><div id="rPreview"></div>';}

    function viewFahrtkosten(){
      var km=0;for(var i=0;i<eintraege.length;i++){var e=eintraege[i];var s=null;for(var j=0;j<studios.length;j++)if(studios[j].id===e.studio_id)s=studios[j];km+=(s&&s.entfernung?s.entfernung:0)*2*e.anzahl;}
      var betrag=km*appSettings.kmSatz;
      return '<div class="stats-grid"><div class="stat-card"><div class="stat-value">'+km.toFixed(1)+'</div><div class="stat-label">km gesamt</div></div>'
        +'<div class="stat-card"><div class="stat-value">€ '+betrag.toFixed(2)+'</div><div class="stat-label">Betrag</div></div></div>'
        +'<div class="disclaimer">⚠️ Fahrtkosten sind Betriebsausgaben.</div>';
    }

    function viewStudios(){
      var rows='';for(var i=0;i<studios.length;i++){var s=studios[i];rows+='<tr><td>'+s.name+'</td><td>'+(s.ort||'–')+'</td><td>'+(s.entfernung||0)+'</td><td>€ '+(s.verguetung||0)+'</td><td><button class="btn-small delStudio" data-id="'+s.id+'">Löschen</button></td></tr>';}
      return '<div class="form-section"><h2>Neues Studio</h2>'
        +'<label>Name</label><input type="text" id="sName">'
        +'<label>E-Mail</label><input type="email" id="sEmail">'
        +'<label>Ort</label><input type="text" id="sOrt">'
        +'<label>Entfernung (km einfach)</label><input type="number" id="sEntfernung" step="0.1" value="0">'
        +'<label>Vergütung pro '+appSettings.einheit+'</label><input type="number" id="sVerguetung" step="0.01" value="0">'
        +'<button class="btn btn-primary" id="saveStudio">Speichern</button></div>'
        +'<h2 style="margin-bottom:16px;">Studios</h2><table><thead><tr><th>Name</th><th>Ort</th><th>km</th><th>Vergütung</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    }

    function viewEinstellungen(){return '<div class="form-section"><h2>Persönliche Daten</h2>'
      +'<label>Name</label><input type="text" id="setName" value="'+(appSettings.name||'')+'">'
      +'<label>Strasse</label><input type="text" id="setStrasse" value="'+(appSettings.strasse||'')+'">'
      +'<label>PLZ</label><input type="text" id="setPLZ" value="'+(appSettings.plz||'')+'">'
      +'<label>Ort</label><input type="text" id="setOrt" value="'+(appSettings.ort||'')+'">'
      +'<label>km-Satz (€)</label><input type="number" id="setKmSatz" step="0.01" value="'+appSettings.kmSatz+'">'
      +'<button class="btn btn-primary" id="saveSettings">Speichern</button></div>'
      +'<div class="disclaimer">⚠️ Steuerdaten bitte mit Steuerberater abstimmen.</div>';}

    function bindAppButtons(){
      var se=document.getElementById('saveEintrag');if(se)se.addEventListener('click',saveEintrag);
      var ss=document.getElementById('saveStudio');if(ss)ss.addEventListener('click',saveStudio);
      var st=document.getElementById('saveSettings');if(st)st.addEventListener('click',saveSettings);
      var gr=document.getElementById('genRechnung');if(gr)gr.addEventListener('click',genRechnung);
      var de=document.querySelectorAll('.delEintrag');for(var i=0;i<de.length;i++)de[i].addEventListener('click',function(e){delEintrag(e.target.getAttribute('data-id'));});
      var ds=document.querySelectorAll('.delStudio');for(var j=0;j<ds.length;j++)ds[j].addEventListener('click',function(e){delStudio(e.target.getAttribute('data-id'));});
    }

    function saveEintrag(){
      var datum=document.getElementById('eDatum').value;var studioId=document.getElementById('eStudio').value;
      var anzahl=parseInt(document.getElementById('eAnzahl').value);var notiz=document.getElementById('eNotiz').value;
      if(!datum||!studioId){alert('Datum und Studio erforderlich.');return;}
      SB.insert('eintraege',[{datum:datum,studio_id:studioId,anzahl:anzahl,notiz:notiz}]).then(function(r){
        if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}loadData().then(renderApp);});
    }
    function delEintrag(id){if(!confirm('Löschen?'))return;SB.remove('eintraege',id).then(function(){loadData().then(renderApp);});}
    function saveStudio(){
      var name=document.getElementById('sName').value;if(!name){alert('Name erforderlich.');return;}
      var d={name:name,email:document.getElementById('sEmail').value,ort:document.getElementById('sOrt').value,
        entfernung:parseFloat(document.getElementById('sEntfernung').value),verguetung:parseFloat(document.getElementById('sVerguetung').value)};
      SB.insert('studios',[d]).then(function(r){if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}loadData().then(renderApp);});
    }
    function delStudio(id){if(!confirm('Löschen?'))return;SB.remove('studios',id).then(function(){loadData().then(renderApp);});}
    function saveSettings(){
      appSettings=Object.assign(appSettings,{name:document.getElementById('setName').value,strasse:document.getElementById('setStrasse').value,
        plz:document.getElementById('setPLZ').value,ort:document.getElementById('setOrt').value,kmSatz:parseFloat(document.getElementById('setKmSatz').value)});
      SB.upsert('app_settings',[{id:'main',data:appSettings}]).then(function(r){if(r.error){alert('Fehler: '+((r.error&&r.error.message)||JSON.stringify(r.error)));return;}alert('Gespeichert!');});
    }
    function genRechnung(){
      var monat=document.getElementById('rMonat').value;var studioId=document.getElementById('rStudio').value;
      if(!monat){alert('Monat auswählen.');return;}var p=monat.split('-');var year=p[0],month=p[1];
      var total=0,lines='';
      for(var i=0;i<eintraege.length;i++){var e=eintraege[i];if(e.datum.indexOf(year+'-'+month)!==0)continue;if(studioId&&e.studio_id!==studioId)continue;
        var s=null;for(var j=0;j<studios.length;j++)if(studios[j].id===e.studio_id)s=studios[j];
        var betrag=(s&&s.verguetung?s.verguetung:0)*e.anzahl;total+=betrag;
        lines+='<tr><td>'+e.datum+'</td><td>'+(s?s.name:'?')+'</td><td>'+e.anzahl+'</td><td>€ '+betrag.toFixed(2)+'</td></tr>';}
      document.getElementById('rPreview').innerHTML='<div class="form-section"><h2>Rechnung '+appSettings.rechnungPrefix+appSettings.naechsteNr+'</h2>'
        +'<p><strong>'+appSettings.name+'</strong></p><p>Zeitraum: '+month+'/'+year+'</p>'
        +'<table><thead><tr><th>Datum</th><th>Studio</th><th>Anzahl</th><th>Betrag</th></tr></thead><tbody>'+lines+'</tbody></table>'
        +'<p style="font-weight:bold;">Gesamtbetrag: € '+total.toFixed(2)+'</p><button class="btn btn-primary" onclick="window.print()">Drucken</button></div>';
    }

    function boot(){
      try{
        var btn=document.getElementById('connectBtn');
        if(btn)btn.addEventListener('click',doConnect);
        var url=localStorage.getItem('supabaseUrl');var key=localStorage.getItem('supabaseKey');
        if(url&&key){
          SB.init(url,key);
          renderAuth();
        }
        // sonst: der feste Setup-Screen im HTML bleibt sichtbar
      }catch(err){console.error('Boot error:',err);/* Setup-Screen bleibt stehen */}
    }
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot);}else{boot();}
  </script>
</body>
</html>
